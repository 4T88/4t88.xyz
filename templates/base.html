<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}4T88.xyz{% endblock title %}</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script defer src="/js/main.js"></script>
    <meta property="og:title" content="4T88.xyz">
    <meta property="og:description" content="hi, im 4t88, catch me later and i'll buy you a beer!">
    <meta property="og:image" content="https://4t88.xyz/favicon.png">
    <meta property="og:url" content="https://4t88.xyz">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#3b3a3a">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: radial-gradient(ellipse at center, #232226 0%, #18171b 100%);
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', Courier, monospace;
            color: #eaeaea;
        }
        .card {
            background: transparent !important;
            border: 2px solid #dad6d6;
            border-radius: 16px;
            padding: 3em 3em 2em 3em;
            box-shadow: 0 0 24px 0 #000a;
            max-width: 900px;
            width: 100%;
            color: #eaeaea;
        }
        .site-title {
            text-align: center;
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 0.5em;
            margin-top: 0;
            color: #fff;
        }
        .site-title span {
            border-bottom: 4px solid #dad6d6;
        }
        .nav {
            text-align: center;
            margin-bottom: 2em;
            color: #dad6d6;
        }
        .nav a {
            color: #d9d8d9;
            font-weight: bold;
            text-decoration: none;
            margin: 0 1.5em;
            font-size: 1.2em;
            letter-spacing: 0.03em;
        }
        .nav a.active, .nav a:hover {
            text-decoration: underline;
            color: #fff;
        }
        a, a:visited {
            color: #d9d8d9;
            transition: color 0.2s;
        }
        a:hover {
            color: #b0afb0;
        }
        h1, h2, h3, h4, h5, h6 {
            color: #fff;
        }
        hr {
            border: none;
            border-top: 1px solid #474747;
            margin: 2em 0;
        }
        .ascii-art {
            color: #d9d8d9;
            text-align: center;
            margin-bottom: 2em;
        }
        .sidebar, .footer, .side-nav, .side-nav a, .footer a {
            color: #d9d8d9 !important;
        }
        .footer {
            color: #d9d8d9;
        }
        .side-nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .side-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .side-nav li {
            margin: 0.5em 0;
            width: 100%;
            text-align: center;
        }
        .side-nav a {
            color: #d9d8d9 !important;
            display: inline-block;
            padding: 0.2em 1.2em;
            border-radius: 6px;
        }
        .side-nav a.active, .side-nav a:hover {
            text-decoration: underline;
            color: #fff;
            background: #232226;
        }
        .sidebar .contact-btn {
            position: absolute;
            bottom: 1.5em;
            right: 1.5em;
            background: #232226;
            color: #d9d8d9;
            border: 2px solid #d9d8d9;
            border-radius: 8px;
            padding: 0.5em 1.2em;
            font-size: 1em;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            z-index: 20;
        }
        .sidebar .contact-btn:hover {
            background: #d9d8d9;
            color: #232226;
        }
        .wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .sidebar {
            transition: transform 0.4s cubic-bezier(0.77,0,0.175,1);
            will-change: transform;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            width: 320px;
            min-width: 220px;
            z-index: 20;
            background: #181818;
        }
        .sidebar.show {
            transform: translateX(0);
        }
        .sidebar.hide {
            transform: translateX(-100%);
        }
        .main {
            transition: margin-left 0.4s cubic-bezier(0.77,0,0.175,1), left 0.4s cubic-bezier(0.77,0,0.175,1);
            margin-left: 320px;
            flex-direction: column;
            margin: auto;
            align-items: center;
            background: transparent;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .sidebar.hide ~ .main {
            margin-left: 0 !important;
            left: 0;
        }
        .show-sidebar-btn {
            display: none;
            position: fixed;
            top: 1.5em;
            left: 1.5em;
            z-index: 100;
            background: #181818;
            color: #d9d8d9;
            border: 2px solid #d9d8d9;
            border-radius: 8px;
            padding: 0.5em 1.2em;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .show-sidebar-btn:hover {
            background: #d9d8d9;
            color: #232226;
        }
        .sidebar.hide ~ .show-sidebar-btn {
            display: block;
        }
        .sidebar .burger-btn {
            position: absolute;
            top: 1.5em;
            left: 1.5em;
            background: #232226;
            color: #d9d8d9;
            border: 2px solid #d9d8d9;
            border-radius: 8px;
            padding: 0.5em 1.2em;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            z-index: 20;
        }
        .sidebar .burger-btn:hover {
            background: #d9d8d9;
            color: #232226;
        }
        @media (max-width: 700px) {
            .sidebar {
                width: 90vw;
                min-width: 0;
                max-width: 100vw;
                height: 100vh;
                padding: 0;
            }
            .main {
                margin-left: 0 !important;
                width: 100vw;
                min-width: 0;
                padding: 0 0.5em;
            }
            .show-sidebar-btn {
                top: 1em;
                left: 1em;
                font-size: 1.5em;
                padding: 0.5em 1em;
            }
            .sidebar .burger-btn {
                top: 1em;
                left: 1em;
                font-size: 1.5em;
                padding: 0.5em 1em;
            }
        }
        /* Remove any text-shadow from all elements */
        * {
            text-shadow: none !important;
        }
    </style>
    {% block extra_head %}{% endblock extra_head %}
</head>
<body>
    <div class="wrapper">
        <aside class="sidebar show" id="sidebar">
            <button class="contact-btn" onclick="window.location='mailto:contact@4t88.xyz'">contact</button>
            <button class="burger-btn" onclick="toggleSidebar()">☰</button>
            <div class="ascii-art">
 _  _ _____ ___   ___  
| || |_   _( _ ) ( _ ) 
| || |_| | / _ \ / _ \ 
|__   _| || (_) | (_) |
   |_| |_| \___/ \___/ 
            </div>
            <nav class="side-nav">
                <ul>
                    <li><a href="/">about</a></li>
                    <li><a href="/posts/">blog</a></li>
                </ul>
            </nav>
        </aside>
        <div class="main" id="main-content">
            {% block content %}{% endblock content %}
        </div>
        <button class="show-sidebar-btn" id="showSidebarBtn" onclick="showSidebar()" style="display:none;">⮜</button>
    </div>
    <div class="footer">
        4t88.xyz &copy; 2025 | code on&nbsp;<a href="https://github.com/4t88/4t88.xyz">github</a>
        | <span id="ro-clock"></span> <span id="ro-time"></span>
    </div>    
    <div id="discord-popout" style="display:none;position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);background:#232226;color:#eaeaea;padding:1.5em 2em;border-radius:12px;box-shadow:0 0 24px #000a;z-index:9999;font-family:inherit;font-size:1.2em;">
      <b>Discord username:</b> 4t88
      <br><br>
      <button onclick="document.getElementById('discord-popout').style.display='none'" style="margin-top:1em;padding:0.4em 1em;border:none;border-radius:6px;background:#dad6d6;color:#232226;cursor:pointer;font-size:1em;">Close</button>
    </div>
    <script>
    function getClockEmoji(hour, minute) {
        // Clock emojis go from 1 to 12, so map 0-23 to 1-12
        const hour12 = ((hour % 12) || 12);
        // If minute >= 30, use half-hour emoji
        const base = 0x1F550; // 🕐
        const halfBase = 0x1F55C; // 🕜
        if (minute >= 30) {
            return String.fromCodePoint(halfBase + (hour12 - 1));
        } else {
            return String.fromCodePoint(base + (hour12 - 1));
        }
    }
    function updateRomaniaTime() {
        const now = new Date();
        const roTime = now.toLocaleString('en-GB', {
            timeZone: 'Europe/Bucharest',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour12: false
        });
        const roHour = parseInt(now.toLocaleString('en-GB', { timeZone: 'Europe/Bucharest', hour: '2-digit', hour12: false }));
        const roMinute = parseInt(now.toLocaleString('en-GB', { timeZone: 'Europe/Bucharest', minute: '2-digit' }));
        document.getElementById('ro-clock').textContent = getClockEmoji(roHour, roMinute);
        document.getElementById('ro-time').textContent = roTime;
    }
    setInterval(updateRomaniaTime, 1000);
    updateRomaniaTime();

    // Ensure sidebar and main are in a consistent state on page load
    window.addEventListener('DOMContentLoaded', function() {
        var sidebar = document.getElementById('sidebar');
        var main = document.getElementById('main-content');
        var showBtn = document.getElementById('showSidebarBtn');
        var isMobile = window.matchMedia('(max-width: 700px)').matches;
        if (sidebar.classList.contains('hide')) {
            main.style.marginLeft = '0';
            showBtn.style.display = 'block';
        } else {
            main.style.marginLeft = isMobile ? '0' : '320px';
            showBtn.style.display = 'none';
        }
    });

    function toggleSidebar() {
        var sidebar = document.getElementById('sidebar');
        var main = document.getElementById('main-content');
        var showBtn = document.getElementById('showSidebarBtn');
        var isMobile = window.matchMedia('(max-width: 700px)').matches;
        if (sidebar.classList.contains('hide')) {
            sidebar.classList.remove('hide');
            sidebar.classList.add('show');
            main.style.marginLeft = isMobile ? '0' : '320px';
            showBtn.style.display = 'none';
        } else {
            sidebar.classList.remove('show');
            sidebar.classList.add('hide');
            main.style.marginLeft = '0';
            showBtn.style.display = 'block';
        }
    }
    function showSidebar() {
        var sidebar = document.getElementById('sidebar');
        var main = document.getElementById('main-content');
        var showBtn = document.getElementById('showSidebarBtn');
        var isMobile = window.matchMedia('(max-width: 700px)').matches;
        sidebar.classList.remove('hide');
        sidebar.classList.add('show');
        main.style.marginLeft = isMobile ? '0' : '320px';
        showBtn.style.display = 'none';
    }
    document.getElementById('footer-discord-link').onclick = function(e) {
      e.preventDefault();
      document.getElementById('discord-popout').style.display = 'block';
    };
    </script>
</body>
</html>
